<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <defs>
    <linearGradient id="dmg-bg" x1="0" y1="0" x2="660" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f0fdf9"/>
      <stop offset="0.5" stop-color="#eaf6fc"/>
      <stop offset="1" stop-color="#e8f0fe"/>
    </linearGradient>
    <linearGradient id="loop" x1="20" y1="20" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#21d6ad"/>
      <stop offset="0.46" stop-color="#12c4df"/>
      <stop offset="1" stop-color="#246ff2"/>
    </linearGradient>
    <linearGradient id="rimLight" x1="32" y1="48" x2="72" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.24" stop-color="#ffffff" stop-opacity="0.48"/>
      <stop offset="0.58" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1b6678" flood-opacity="0.15"/>
    </filter>
    <mask id="upperArcMask" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="140" height="140" fill="black"/>
      <path
        d="M28 68c0-19 15-34 34-34 8 0 15 3 21 7"
        fill="none"
        stroke="white"
        stroke-width="11"
        stroke-linecap="round"
      />
    </mask>
  </defs>

  <!-- Background gradient -->
  <rect width="660" height="400" fill="url(#dmg-bg)"/>

  <!-- Decorative large watermark icon in bottom-right corner -->
  <g transform="translate(470, 240) scale(1.2)" opacity="0.08">
    <path d="M28 68c0-19 15-34 34-34 8 0 15 3 21 7" fill="none" stroke="#12c4df" stroke-width="20" stroke-linecap="round"/>
    <path d="M92 62c0 19-15 34-34 34-8 0-15-3-21-7" fill="none" stroke="#12c4df" stroke-width="20" stroke-linecap="round"/>
    <path d="M84 30l1 20-19-6" fill="none" stroke="#12c4df" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M36 100l-1-20 19 6" fill="none" stroke="#12c4df" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Small icon near app position (180, 170) -->
  <g transform="translate(148, 138)" filter="url(#softShadow)">
    <path
      d="M32 68c0-19 15-34 34-34 8 0 15 3 21 7"
      fill="none"
      stroke="url(#loop)"
      stroke-width="11"
      stroke-linecap="round"
    />
    <path
      d="M92 62c0 19-15 34-34 34-8 0-15-3-21-7"
      fill="none"
      stroke="url(#loop)"
      stroke-width="11"
      stroke-linecap="round"
    />
    <path
      d="M84 30l1 20-19-6"
      fill="none"
      stroke="url(#loop)"
      stroke-width="11"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <path
      d="M36 100l-1-20 19 6"
      fill="none"
      stroke="url(#loop)"
      stroke-width="11"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <path
      d="M36 48c6-6 15-10 24-10 5 0 10 1 15 4"
      fill="none"
      stroke="url(#rimLight)"
      stroke-width="2.5"
      stroke-linecap="round"
      mask="url(#upperArcMask)"
    />
  </g>

  <!-- Arrow hint from app to Applications -->
  <text x="320" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8" text-anchor="middle">
    →
  </text>
</svg>
