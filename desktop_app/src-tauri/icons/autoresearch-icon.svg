<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Main gradient: deep blue to indigo/purple -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="50%" style="stop-color:#283593"/>
      <stop offset="100%" style="stop-color:#4527a0"/>
    </linearGradient>
    <!-- Accent gradient for the lens -->
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#42a5f5"/>
      <stop offset="100%" style="stop-color:#7c4dff"/>
    </linearGradient>
    <!-- Glow effect -->
    <radialGradient id="glow" cx="50%" cy="42%" r="45%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
  </defs>

  <!-- Background: rounded rectangle (macOS style squircle) -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern for tech feel -->
  <g opacity="0.035" stroke="white" stroke-width="1" fill="none">
    <line x1="256" y1="0" x2="256" y2="1024"/>
    <line x1="512" y1="0" x2="512" y2="1024"/>
    <line x1="768" y1="0" x2="768" y2="1024"/>
    <line x1="0" y1="256" x2="1024" y2="256"/>
    <line x1="0" y1="512" x2="1024" y2="512"/>
    <line x1="0" y1="768" x2="1024" y2="768"/>
  </g>

  <!-- Glow overlay -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#glow)"/>

  <!-- Main icon group: magnifying glass with integrated A + gear -->
  <g transform="translate(480, 460)" filter="url(#shadow)">

    <!-- Magnifying glass lens (circle) -->
    <circle cx="-20" cy="-60" r="195" fill="none" stroke="white" stroke-width="44" opacity="0.95"/>

    <!-- Lens inner glow -->
    <circle cx="-20" cy="-60" r="173" fill="url(#lensGrad)" opacity="0.15"/>

    <!-- Lens reflection highlight -->
    <ellipse cx="-65" cy="-115" rx="55" ry="28" fill="white" opacity="0.12" transform="rotate(-25, -65, -115)"/>

    <!-- Magnifying glass handle -->
    <line x1="118" y1="78" x2="248" y2="208" stroke="white" stroke-width="44" stroke-linecap="round" opacity="0.95"/>

    <!-- Gear at the handle end (automation symbol) -->
    <g transform="translate(268, 228)" opacity="0.9">
      <circle cx="0" cy="0" r="55" fill="none" stroke="white" stroke-width="26"/>
      <circle cx="0" cy="0" r="22" fill="#283593"/>
      <!-- Gear teeth (8 teeth) -->
      <g fill="white">
        <rect x="-12" y="-76" width="24" height="32" rx="5"/>
        <rect x="-12" y="44" width="24" height="32" rx="5"/>
        <rect x="-76" y="-12" width="32" height="24" rx="5"/>
        <rect x="44" y="-12" width="32" height="24" rx="5"/>
        <rect x="30" y="-58" width="24" height="32" rx="5" transform="rotate(45)"/>
        <rect x="-54" y="26" width="24" height="32" rx="5" transform="rotate(45)"/>
        <rect x="-54" y="-58" width="24" height="32" rx="5" transform="rotate(-45)"/>
        <rect x="30" y="26" width="24" height="32" rx="5" transform="rotate(-45)"/>
      </g>
    </g>

    <!-- "A" letter inside the lens - bold and prominent -->
    <g fill="white" opacity="0.92">
      <path d="M-75,8 L-20,-100 L35,8 L20,8 L8,-28 L-48,-28 L-60,8 Z M-38,-44 L14,-44 L-12,-82 Z"/>
    </g>

  </g>

  <!-- Small decorative dots (circuit/AI nodes) -->
  <g fill="white" opacity="0.1">
    <circle cx="150" cy="190" r="7"/>
    <circle cx="870" cy="280" r="5"/>
    <circle cx="190" cy="790" r="4"/>
    <circle cx="840" cy="760" r="6"/>
    <circle cx="110" cy="500" r="3.5"/>
    <circle cx="910" cy="530" r="4.5"/>
  </g>

  <!-- Connecting lines (circuit traces) -->
  <g stroke="white" stroke-width="1.5" opacity="0.05" fill="none">
    <path d="M150,190 Q180,340 150,500"/>
    <path d="M870,280 Q855,400 840,530"/>
    <path d="M150,500 Q380,540 640,510 Q770,500 840,530"/>
  </g>

</svg>
