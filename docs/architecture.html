<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>autoresearch · Architecture</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #faf6f0;
      --color-paper-2: #f0ebe3;
      --color-ink:     #1c1917;
      --color-muted:   #78716c;
      --color-soft:    #a8a29e;
      --color-accent:  #d97706;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }

    .frame { max-width: 1200px; width: 100%; }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 1.5rem;
    }

    svg { width: 100%; min-width: 900px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Architecture · autoresearch</p>
    <h1>Multi-Agent Iterative Review System</h1>

    <svg viewBox="0 0 960 700" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#78716c"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#d97706"/>
        </marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#c05621"/>
        </marker>
      </defs>

      <!-- Background -->
      <rect width="100%" height="100%" fill="#faf6f0"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.55"/>

      <!-- ===== ARROWS (drawn before boxes for z-order) ===== -->

      <!-- 1. GitHub Issue → run.sh -->
      <line x1="480" y1="88" x2="480" y2="156" stroke="#78716c" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- 2. .autoresearch/ → run.sh -->
      <line x1="688" y1="184" x2="588" y2="184" stroke="#78716c" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="616" y="172" width="52" height="12" rx="2" fill="#faf6f0"/>
      <text x="642" y="181" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em">CONFIG</text>

      <!-- 3. run.sh → Claude -->
      <line x1="420" y1="212" x2="248" y2="300" stroke="#78716c" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- 4. run.sh → Codex -->
      <line x1="480" y1="212" x2="480" y2="300" stroke="#78716c" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- 5. run.sh → OpenCode -->
      <line x1="540" y1="212" x2="712" y2="300" stroke="#78716c" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- 6. Claude → Score Gate -->
      <line x1="212" y1="348" x2="420" y2="436" stroke="#78716c" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- 7. Codex → Score Gate -->
      <line x1="480" y1="348" x2="480" y2="436" stroke="#78716c" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- 8. OpenCode → Score Gate -->
      <line x1="744" y1="348" x2="540" y2="436" stroke="#78716c" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- 9. Score Gate → Auto PR (PASS) -->
      <line x1="480" y1="484" x2="480" y2="548" stroke="#d97706" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
      <rect x="456" y="504" width="48" height="12" rx="2" fill="#faf6f0"/>
      <text x="480" y="513" fill="#d97706" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em" font-weight="600">PASS</text>

      <!-- 10. Score Gate → run.sh (FAIL, loop back) -->
      <path d="M 372,460 L 80,460 L 80,184 L 372,184" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow-accent)"/>
      <rect x="56" y="308" width="48" height="12" rx="2" fill="#faf6f0"/>
      <text x="80" y="317" fill="#d97706" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.06em" font-weight="600">FAIL</text>

      <!-- ===== NODES ===== -->

      <!-- 1. GitHub Issue (external) -->
      <rect x="408" y="40" width="144" height="48" rx="6" fill="#faf6f0"/>
      <rect x="408" y="40" width="144" height="48" rx="6" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
      <rect x="416" y="46" width="48" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
      <text x="440" y="55" fill="rgba(28,25,23,0.80)" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">INPUT</text>
      <text x="480" y="74" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">GitHub Issue</text>

      <!-- 2. run.sh (FOCAL) -->
      <rect x="372" y="156" width="216" height="56" rx="6" fill="#faf6f0"/>
      <rect x="372" y="156" width="216" height="56" rx="6" fill="rgba(217,119,6,0.08)" stroke="#d97706" stroke-width="1.2"/>
      <rect x="380" y="162" width="40" height="12" rx="2" fill="transparent" stroke="rgba(217,119,6,0.50)" stroke-width="0.8"/>
      <text x="400" y="171" fill="rgba(217,119,6,0.90)" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">CORE</text>
      <text x="480" y="192" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">run.sh</text>

      <!-- 3. .autoresearch/ Config (store) -->
      <rect x="688" y="160" width="176" height="48" rx="6" fill="#faf6f0"/>
      <rect x="688" y="160" width="176" height="48" rx="6" fill="rgba(28,25,23,0.05)" stroke="#78716c" stroke-width="1"/>
      <rect x="696" y="166" width="52" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.30)" stroke-width="0.8"/>
      <text x="722" y="175" fill="rgba(28,25,23,0.70)" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">CONFIG</text>
      <text x="776" y="194" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">.autoresearch/</text>

      <!-- 4. Claude (backend) -->
      <rect x="148" y="300" width="128" height="48" rx="6" fill="#faf6f0"/>
      <rect x="148" y="300" width="128" height="48" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
      <rect x="156" y="306" width="52" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.30)" stroke-width="0.8"/>
      <text x="182" y="315" fill="rgba(28,25,23,0.70)" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">AGENT</text>
      <text x="212" y="334" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Claude</text>

      <!-- 5. Codex (backend) -->
      <rect x="416" y="300" width="128" height="48" rx="6" fill="#faf6f0"/>
      <rect x="416" y="300" width="128" height="48" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
      <rect x="424" y="306" width="52" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.30)" stroke-width="0.8"/>
      <text x="450" y="315" fill="rgba(28,25,23,0.70)" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">AGENT</text>
      <text x="480" y="334" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Codex</text>

      <!-- 6. OpenCode (backend) -->
      <rect x="680" y="300" width="128" height="48" rx="6" fill="#faf6f0"/>
      <rect x="680" y="300" width="128" height="48" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
      <rect x="688" y="306" width="52" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.30)" stroke-width="0.8"/>
      <text x="714" y="315" fill="rgba(28,25,23,0.70)" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">AGENT</text>
      <text x="744" y="334" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">OpenCode</text>

      <!-- 7. Score Gate (backend) -->
      <rect x="372" y="436" width="216" height="48" rx="6" fill="#faf6f0"/>
      <rect x="372" y="436" width="216" height="48" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
      <rect x="380" y="442" width="44" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.30)" stroke-width="0.8"/>
      <text x="402" y="451" fill="rgba(28,25,23,0.70)" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">GATE</text>
      <text x="480" y="468" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Score ≥ 85?</text>

      <!-- 8. Auto PR → Merge → Close (link/output) -->
      <rect x="340" y="548" width="280" height="48" rx="6" fill="#faf6f0"/>
      <rect x="340" y="548" width="280" height="48" rx="6" fill="#ffffff" stroke="#c05621" stroke-width="1"/>
      <rect x="348" y="554" width="56" height="12" rx="2" fill="transparent" stroke="rgba(192,86,33,0.40)" stroke-width="0.8"/>
      <text x="376" y="563" fill="rgba(192,86,33,0.80)" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">OUTPUT</text>
      <text x="480" y="580" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">PR → Merge → Close Issue</text>

      <!-- ===== LEGEND ===== -->
      <line x1="32" y1="620" x2="928" y2="620" stroke="rgba(28,25,23,0.10)" stroke-width="0.8"/>
      <text x="32" y="644" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.14em">LEGEND</text>

      <!-- Focal -->
      <rect x="100" y="636" width="16" height="12" rx="2" fill="rgba(217,119,6,0.08)" stroke="#d97706" stroke-width="1"/>
      <text x="124" y="646" fill="#78716c" font-size="8" font-family="'Geist', sans-serif">Orchestrator</text>

      <!-- Backend -->
      <rect x="224" y="636" width="16" height="12" rx="2" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
      <text x="248" y="646" fill="#78716c" font-size="8" font-family="'Geist', sans-serif">Agent / Gate</text>

      <!-- Store -->
      <rect x="340" y="636" width="16" height="12" rx="2" fill="rgba(28,25,23,0.05)" stroke="#78716c" stroke-width="1"/>
      <text x="364" y="646" fill="#78716c" font-size="8" font-family="'Geist', sans-serif">Config Store</text>

      <!-- External -->
      <rect x="460" y="636" width="16" height="12" rx="2" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
      <text x="484" y="646" fill="#78716c" font-size="8" font-family="'Geist', sans-serif">External Input</text>

      <!-- Accent arrow -->
      <line x1="580" y1="642" x2="608" y2="642" stroke="#d97706" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
      <text x="618" y="646" fill="#78716c" font-size="8" font-family="'Geist', sans-serif">Primary flow</text>

      <!-- Dashed arrow -->
      <line x1="720" y1="642" x2="748" y2="642" stroke="#d97706" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow-accent)"/>
      <text x="758" y="646" fill="#78716c" font-size="8" font-family="'Geist', sans-serif">Loop back</text>

      <!-- Editorial callout -->
      <text x="480" y="680" fill="#a8a29e" font-size="9" font-family="'Instrument Serif', serif" font-style="italic" text-anchor="middle">Agents rotate via (iter − 1) % N — each iteration brings a fresh perspective</text>

    </svg>
  </div>
</body>
</html>
